services:
  dev-proxy:
    image: itzg/minecraft-server:latest
    container_name: kitsunebi-dev-proxy
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "dev-rcon-password"
      RCON_PORT: "25575"
      SERVER_PORT: "25565"
      ONLINE_MODE: "false"
      TZ: "Asia/Tokyo"
    ports:
      - "25565:25565"
      - "25575:25575"
    volumes:
      - ../../.kitsunebi/dev/dev-proxy/data:/data

  dev-vanilla:
    image: itzg/minecraft-server:latest
    container_name: kitsunebi-dev-vanilla
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "dev-rcon-password"
      RCON_PORT: "25576"
      SERVER_PORT: "25565"
      ONLINE_MODE: "false"
      TZ: "Asia/Tokyo"
    ports:
      - "25566:25565"
      - "25576:25576"
    volumes:
      - ../../.kitsunebi/dev/dev-vanilla/data:/data
