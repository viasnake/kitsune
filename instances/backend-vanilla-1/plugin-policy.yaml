plugins:
  LuckPerms:
    jar:
      target: plugins/LuckPerms.jar
      ownership: managed
    files:
      - target: plugins/LuckPerms/config.yml
        source: plugin-configs/LuckPerms/config.yml
        ownership: managed
        apply: explicit
      - target: plugins/LuckPerms/storage/
        ownership: state
      - target: plugins/LuckPerms/translations/
        ownership: generated

default:
  ownership: unknown
  action: observe-only
